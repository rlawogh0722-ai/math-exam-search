<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 수학 기출 기적 검색기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
        }
        .search-box {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #3b82f6;
        }
        .tip {
            font-size: 13px;
            color: #64748b;
            margin-top: 10px;
            line-height: 1.5;
        }
        .result-count {
            font-weight: bold;
            margin-bottom: 12px;
            color: #475569;
        }
        .card {
            background: white;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
            margin-bottom: 12px;
            border-left: 5px solid #3b82f6;
        }
        .card h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #1e293b;
        }
        .tags {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .tags span {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }
        .btn-link {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-link:hover {
            background: #1d4ed8;
        }
        .no-result {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 고등수학 기출문제 검색 엔진</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="검색어를 입력하세요... (예: 수2 정적분 2025 22번)" oninput="handleSearch()">
        <div class="tip">
            💡 <b>띄어쓰기로 AND 검색 가능</b> | 예: <mark>수2 적분 25</mark> (2자리는 문항번호, 4자리는 연도로 자동 인식)<br>
            정적분을 검색하면 부정적분 파일은 똑똑하게 제외됩니다.
        </div>
    </div>

    <div id="resultCount" class="result-count"></div>
    <div id="results"></div>
</div>

<script>
    let database = [];

    // 1. 업로드한 데이터 파일(JSON)을 불러옵니다.
    fetch('math_data.json')
        .then(response => response.json())
        .then(data => {
            database = data;
            document.getElementById('resultCount').innerText = `✅ 총 ${database.length}개의 기출 파일 로드 완료`;
        })
        .catch(err => {
            console.error("데이터 로드 실패:", err);
            document.getElementById('resultCount').innerText = `❌ 데이터를 불러오지 못했습니다.`;
        });

    // 한글 자모분리 방지 및 소문자 정규화 함수
    function cleanText(text) {
        return text.normalize('NFC').trim().toLowerCase();
    }

    // 2. 파이썬의 똑똑한 검색 로직을 자바스크립트로 그대로 재현한 함수
    function handleSearch() {
        const query = document.getElementById('searchInput').value;
        const resultsContainer = document.getElementById('results');
        const countContainer = document.getElementById('resultCount');
        
        if (!query.trim()) {
            resultsContainer.innerHTML = '';
            countContainer.innerText = `✅ 총 ${database.length}개의 기출 파일 로드 완료`;
            return;
        }

        const keywords = query.split(/\s+/).map(cleanText).filter(k => k);
        
        const filtered = database.filter(item => {
            // 비교하기 쉽게 구조 분할
            const parts = [
                cleanText(item.major),
                cleanText(item.mid),
                cleanText(item.small),
                cleanText(item.year),
                cleanText(item.num)
            ];

            // 모든 키워드가 만족해야 함 (AND 검색)
            return keywords.every(kw => {
                let kwMatched = false;

                for (let idx = 0; idx < parts.length; idx++) {
                    const part = parts[idx];
                    if (!part) continue;

                    // ① 과목명 간섭 방지 ('수2' 검색 시 단원명에 섞인 '수2' 차단)
                    if (['수1', '수2'].includes(kw)) {
                        if (idx === 0 && part === kw) {
                            kwMatched = true;
                            break;
                        }
                        continue;
                    }

                    // ② '정적분' 검색 시 '부정적분' 완벽 제외
                    if (kw === '정적분') {
                        if (part.includes('정적분') && !part.includes('부정적분')) {
                            kwMatched = true;
                            break;
                        }
                        continue;
                    }

                    // ③ 숫자 검색 혼동 방지 (4자리는 연도, 2자리는 문항번호)
                    if (/^\d+$/.test(kw)) {
                        if (kw.length === 4) {
                            if (idx === 3 && part === kw) {
                                kwMatched = true;
                                break;
                            }
                        } else if (kw.length === 2) {
                            if (idx === 4 && part.includes(kw)) {
                                kwMatched = true;
                                break;
                            }
                        } else {
                            if (part.includes(kw)) {
                                kwMatched = true;
                                break;
                            }
                        }
                        continue;
                    }

                    // 일반 문자열 및 '22번' 형태로 검색했을 때의 처리
                    if (part.includes(kw)) {
                        if (kw.includes('번') && idx !== 4) {
                            continue;
                        }
                        kwMatched = true;
                        break;
                    }
                }
                return kwMatched;
            });
        });

        // 3. 화면에 검색 결과 렌더링
        countContainer.innerText = `🎯 ${filtered.length}개 발견!`;
        
        if (filtered.length === 0) {
            resultsContainer.innerHTML = '<div class="no-result">조건에 맞는 기출문제를 찾지 못했습니다. 😥</div>';
            return;
        }

        resultsContainer.innerHTML = filtered.map(item => `
            <div class="card">
                <h3>📄 ${item.filename}</h3>
                <div class="tags">
                    <span>${item.major}</span>
                    <span>${item.mid}</span>
                    <span>${item.small}</span>
                    <span>${item.year}년</span>
                    ${item.num ? `<span>${item.num}</span>` : ''}
                </div>
                <a href="${item.link}" target="_blank" class="btn-link">🔗 드라이브에서 열기</a>
            </div>
        `).join('');
    }
</script>

</body>
</html>
